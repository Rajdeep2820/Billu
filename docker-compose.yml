version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: billu_postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: billu_secret
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: billu_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_secret

volumes:
  postgres_data:
