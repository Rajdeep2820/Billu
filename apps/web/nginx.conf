server {
    listen 80;

    # Serve the React SPA
    root /usr/share/nginx/html;
    index index.html;

    # All unknown routes → index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the api service
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Payment page requests
    location /pay/ {
        proxy_pass http://api:4000/pay/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy Socket.io
    location /socket.io/ {
        proxy_pass http://api:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
